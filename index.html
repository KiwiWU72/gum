<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧬 植物膠體結構互動展示系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft JhengHei', 'Segoe UI', system-ui, sans-serif;
  background: #eef2f7;
  color: #2d3748;
  min-height: 100vh;
}
@keyframes bounce {
  0%,100% { transform: translateY(0) scaleX(1) scaleY(1); }
  45%      { transform: translateY(-18px) scaleX(0.93) scaleY(1.07); }
  55%      { transform: translateY(-16px) scaleX(0.95) scaleY(1.05); }
}
@keyframes wobble {
  0%,100% { border-radius: 62% 38% 55% 45% / 52% 58% 42% 48%; }
  33%     { border-radius: 45% 55% 40% 60% / 58% 42% 62% 38%; }
  66%     { border-radius: 55% 45% 62% 38% / 40% 60% 40% 60%; }
}
@keyframes shimmer {
  0%,100% { box-shadow: 0 0 18px rgba(100,200,255,.35), inset 0 0 22px rgba(255,255,255,.55); }
  50%     { box-shadow: 0 0 30px rgba(100,200,255,.65), inset 0 0 32px rgba(255,255,255,.85); }
}
@keyframes drip {
  0%,75%  { transform: scaleY(1) scaleX(1); }
  88%     { transform: scaleY(1.12) scaleX(0.93); }
  100%    { transform: scaleY(1) scaleX(1); }
}
@keyframes melt {
  0%,100% { border-radius: 8px 8px 8px 8px; transform: scaleX(1); }
  50%     { border-radius: 8px 8px 28px 28px; transform: scaleX(1.06); }
}
@keyframes arrowPulse {
  0%,100% { transform: scaleX(1); }
  50%     { transform: scaleX(1.04); }
}
@keyframes float {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%     { transform: translateX(-50%) translateY(-5px); }
}
@keyframes ionPulse {
  0%,100% { r: 12; }
  50%     { r: 14; }
}
button:focus { outline: none; }
::-webkit-scrollbar { height: 4px; width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ─────────────── Colour tokens ─────────────── */
const C = {
  kgm:      '#F5E6C8',
  kappa:    '#7EC8E3',
  iota:     '#C9A6E0',
  lbg:      '#7DBD6A',
  xanthan:  '#F4A235',
  cmc:      '#A8C4D4',
  laGellan: '#B8E0FF',
  haGellan: '#FFD6E0',
  hmPectin: '#FF7E6B',
  lmPectin: '#FFB085',
  arabic:   '#F5F0E8',
  gel240:   '#D8EEFF',
  gel160:   '#EEEFF5',
  ca:       '#FFD700',
  k:        '#BBBBCC',
};

/* ─────────────── SVG Molecular Diagrams ─────────────── */

function SynergismDiagram() {
  return (
    <svg viewBox="0 0 440 210" style={{width:'100%',maxWidth:440,height:'auto'}}>
      <rect width="440" height="210" rx="14" fill="rgba(245,250,255,.85)"/>

      {/* ── Kappa helix bundles (3 vertical springs) ── */}
      {[70,200,330].map((bx,bi) => {
        const pts = [];
        for (let i=0;i<=12;i++) {
          const x = bx + Math.sin(i*0.9)*(bi===1?22:18);
          const y = 20 + i*14;
          pts.push(`${i===0?'M':'L'} ${x} ${y}`);
        }
        return (
          <g key={bi}>
            <path d={pts.join(' ')} stroke={C.kappa} strokeWidth="7"
              fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <path d={pts.join(' ')} stroke="rgba(255,255,255,.45)" strokeWidth="3"
              fill="none" strokeLinecap="round" strokeDasharray="3 10"/>
            {/* Sulfate spikes */}
            {[2,5,8,11].map(si => {
              const sx = bx + Math.sin(si*0.9)*(bi===1?22:18);
              const sy = 20 + si*14;
              const nx = sx + (Math.sin(si*0.9)>0?14:-14);
              return (
                <g key={si}>
                  <line x1={sx} y1={sy} x2={nx} y2={sy-8}
                    stroke={C.kappa} strokeWidth="2" opacity=".7"/>
                  <circle cx={nx} cy={sy-8} r="4" fill={C.kappa} opacity=".8"/>
                </g>
              );
            })}
            {/* K+ ions */}
            <circle cx={bx} cy={185} r="9" fill={C.k} stroke="white" strokeWidth="2"/>
            <text x={bx} y={189} fontSize="9" textAnchor="middle" fontWeight="bold" fill="#444">K⁺</text>
            {/* Junction label */}
            <rect x={bx-34} y={195} width="68" height="12" rx="6" fill={`${C.kappa}55`}/>
            <text x={bx} y={205} fontSize="8" textAnchor="middle" fill="#2a6a8a" fontWeight="600">Junction Zone</text>
          </g>
        );
      })}

      {/* ── KGM long diagonal ropes ── */}
      {[
        `M 5 35 C 60 45, 120 90, 185 105 S 300 130, 360 110 S 420 90, 440 85`,
        `M 5 65 C 70 80, 140 115, 210 125 S 330 145, 400 130 S 435 120, 440 118`,
      ].map((d,i) => (
        <g key={i}>
          <path d={d} stroke={C.kgm} strokeWidth="10" fill="none"
            strokeLinecap="round" opacity=".9"/>
          <path d={d} stroke="rgba(255,255,255,.5)" strokeWidth="4"
            fill="none" strokeLinecap="round" strokeDasharray="5 14"/>
          {/* Acetyl bumps */}
          {[80,180,280,370].map(bx2 => (
            <g key={bx2}>
              <circle cx={bx2} cy={i===0?92:112} r="7" fill={C.kgm}
                stroke="rgba(0,0,0,.08)" strokeWidth="1"/>
              <text x={bx2} y={i===0?96:116} fontSize="7" textAnchor="middle" fill="#8B7355">Ac</text>
            </g>
          ))}
        </g>
      ))}

      {/* ── Crosslink glow points ── */}
      {[[155,100,'協同交聯'],[260,118,'協同交聯'],[350,108,'協同交聯']].map(([cx,cy,lbl],i) => (
        <g key={i}>
          <circle cx={cx} cy={cy} r="16" fill="rgba(255,230,80,.4)"/>
          <circle cx={cx} cy={cy} r="10" fill="rgba(255,215,0,.85)"
            stroke="white" strokeWidth="2"/>
          <text x={cx} y={cy-22} fontSize="9" textAnchor="middle"
            fill="#7a5a00" fontWeight="700">{lbl}</text>
          <line x1={cx} y1={cy-12} x2={cx} y2={cy-20}
            stroke="#7a5a00" strokeWidth="1" opacity=".5"/>
        </g>
      ))}

      {/* Legend pills */}
      <rect x="6" y="6" width="112" height="17" rx="8" fill={C.kgm}/>
      <text x="62" y="18" fontSize="10" textAnchor="middle" fontWeight="700" fill="#5a4020">
        KGM 蒟蒻（長鏈）
      </text>
      <rect x="6" y="27" width="128" height="17" rx="8" fill={C.kappa}/>
      <text x="70" y="39" fontSize="10" textAnchor="middle" fontWeight="700" fill="#0a4a6a">
        κ-鹿角菜膠（螺旋束）
      </text>

      {/* MW scale bar */}
      <g transform="translate(295,8)">
        <text x="0" y="10" fontSize="9" fill="#666" fontWeight="600">分子量 MW</text>
        <rect x="0" y="14" width="68" height="8" rx="4" fill={C.kgm}/>
        <text x="72" y="22" fontSize="8" fill="#8B7355">~1,000 kDa</text>
        <rect x="0" y="26" width="27" height="8" rx="4" fill={C.kappa}/>
        <text x="31" y="34" fontSize="8" fill="#3a7ca5">~400 kDa</text>
      </g>
    </svg>
  );
}

function EggBoxDiagram() {
  return (
    <svg viewBox="0 0 440 185" style={{width:'100%',maxWidth:440,height:'auto'}}>
      <rect width="440" height="185" rx="14" fill="rgba(245,250,255,.85)"/>

      {/* Chain 1 – zigzag top */}
      {[0,1,2,3,4,5,6,7].map(i => {
        const x1=25+i*50, xm=25+(i+.5)*50, x2=25+(i+1)*50;
        return i<7 ? (
          <g key={i}>
            <line x1={x1} y1={60} x2={xm} y2={35} stroke={C.laGellan} strokeWidth="7" strokeLinecap="round"/>
            <line x1={xm} y1={35} x2={x2} y2={60} stroke={C.laGellan} strokeWidth="7" strokeLinecap="round"/>
          </g>
        ) : null;
      })}
      {/* Chain 2 – mirror zigzag bottom */}
      {[0,1,2,3,4,5,6,7].map(i => {
        const x1=25+i*50, xm=25+(i+.5)*50, x2=25+(i+1)*50;
        return i<7 ? (
          <g key={i}>
            <line x1={x1} y1={125} x2={xm} y2={150} stroke={C.laGellan} strokeWidth="7" strokeLinecap="round"/>
            <line x1={xm} y1={150} x2={x2} y2={125} stroke={C.laGellan} strokeWidth="7" strokeLinecap="round"/>
          </g>
        ) : null;
      })}

      {/* Ca2+ spheres in pockets */}
      {[0,1,2,3,4,5,6].map(i => {
        const cx=50+i*50;
        return (
          <g key={i}>
            <circle cx={cx} cy={92} r="13" fill={C.ca} stroke="white" strokeWidth="2.5">
              <animate attributeName="r" values="13;15;13" dur="2s"
                repeatCount="indefinite" begin={`${i*.28}s`}/>
            </circle>
            <text x={cx} y={97} fontSize="9" textAnchor="middle"
              fontWeight="800" fill="#5a3800">Ca²⁺</text>
          </g>
        );
      })}

      {/* Annotation lines */}
      <line x1={50} y1={60} x2={50} y2={79} stroke="rgba(0,0,0,.2)" strokeWidth="1.5" strokeDasharray="3,3"/>
      <line x1={50} y1={125} x2={50} y2={105} stroke="rgba(0,0,0,.2)" strokeWidth="1.5" strokeDasharray="3,3"/>

      {/* Labels */}
      <text x="4" y="53" fontSize="9" fill="#3a6a9a" fontWeight="700">LA Gellan 鏈 1</text>
      <text x="4" y="140" fontSize="9" fill="#3a6a9a" fontWeight="700">LA Gellan 鏈 2</text>
      <rect x="135" y="165" width="165" height="16" rx="8" fill="rgba(255,215,0,.2)" stroke={C.ca} strokeWidth="1.2"/>
      <text x="217" y="177" fontSize="9" textAnchor="middle" fill="#7a5000" fontWeight="700">
        蛋盒結構 Egg-Box Model ★
      </text>
    </svg>
  );
}

function HAGellanDiagram() {
  const rows = [
    { y:55, x0:20, col:'#FFB8CC' },
    { y:110, x0:50, col:C.haGellan },
    { y:155, x0:15, col:'#FFCCE0' },
  ];
  return (
    <svg viewBox="0 0 440 195" style={{width:'100%',maxWidth:440,height:'auto'}}>
      <rect width="440" height="195" rx="14" fill="rgba(255,248,252,.85)"/>
      {rows.map((r,ri) => {
        const d=`M ${r.x0} ${r.y} Q ${r.x0+90} ${r.y-35} ${r.x0+180} ${r.y} Q ${r.x0+270} ${r.y+35} ${r.x0+360} ${r.y}`;
        return (
          <g key={ri}>
            <path d={d} stroke={r.col} strokeWidth="7" fill="none" strokeLinecap="round"/>
            <path d={d} stroke="rgba(255,255,255,.5)" strokeWidth="3" fill="none"
              strokeLinecap="round" strokeDasharray="4 12"/>
            {/* Bulky acyl side groups */}
            {[0.2,.5,.8].map((t,j) => {
              const bx=r.x0+t*360;
              const by=r.y + (t===.5 ? (ri%2===0?35:-35) : (ri%2===0?-30:30)) * .5;
              return (
                <g key={j}>
                  <line x1={bx} y1={by} x2={bx} y2={by-(j===1?-22:22)}
                    stroke={r.col} strokeWidth="2.5"/>
                  <circle cx={bx} cy={by-(j===1?-28:28)} r="13"
                    fill={r.col} stroke="white" strokeWidth="2" opacity=".9"/>
                  <text x={bx} y={by-(j===1?-24:24)} fontSize="8"
                    textAnchor="middle" fill="#8a4060">Acyl</text>
                  {/* Repulsion arrow to neighbour */}
                  {ri < 2 && j===1 && (
                    <text x={bx+22} y={by-(j===1?-24:24)}
                      fontSize="14" fill="#e060a0">↔</text>
                  )}
                </g>
              );
            })}
          </g>
        );
      })}
      <rect x="6" y="176" width="310" height="14" rx="7" fill="rgba(255,182,205,.3)"/>
      <text x="161" y="187" fontSize="9" textAnchor="middle" fill="#a04060" fontWeight="700">
        HA Gellan — 醯基側鏈阻礙螺旋緊密聚集 → 柔軟凝膠
      </text>
    </svg>
  );
}

function HMPectinDiagram() {
  return (
    <svg viewBox="0 0 440 215" style={{width:'100%',maxWidth:440,height:'auto'}}>
      <rect width="440" height="215" rx="14" fill="rgba(255,248,248,.85)"/>
      {/* Two pectin chains at y=65 and y=125 — with room above and below */}
      {[65,125].map((baseY,ri) => (
        <g key={ri}>
          <line x1={20} y1={baseY} x2={420} y2={baseY}
            stroke={C.hmPectin} strokeWidth="6" strokeLinecap="round"/>
          {[0,1,2,3,4,5,6,7].map(i => {
            const mx=42+i*50;
            return (
              <g key={i}>
                <circle cx={mx} cy={baseY-17} r="11"
                  fill="#FF5A45" stroke="white" strokeWidth="1.5"/>
                <text x={mx} y={baseY-12} fontSize="7"
                  textAnchor="middle" fill="white" fontWeight="700">OCH₃</text>
                <line x1={mx} y1={baseY} x2={mx} y2={baseY-6}
                  stroke={C.hmPectin} strokeWidth="2.5"/>
              </g>
            );
          })}
        </g>
      ))}
      {/* Hydrophobic zone highlight — positioned between the two chains */}
      <rect x="178" y="52" width="95" height="87" rx="10"
        fill="rgba(255,200,150,.18)" stroke="rgba(255,140,80,.6)"
        strokeWidth="2" strokeDasharray="6,3"/>
      {/* Label to the right of the box, no overlap */}
      <line x1="273" y1="88" x2="300" y2="88" stroke="rgba(255,140,80,.7)" strokeWidth="1.5"/>
      <text x="304" y="84" fontSize="9" fill="#c04020" fontWeight="700">疏水結合區</text>
      <text x="304" y="97" fontSize="8" fill="#c04020">Hydrophobic</text>
      <text x="304" y="108" fontSize="8" fill="#c04020">Zone</text>
      {/* Condition badges — moved to bottom strip, no overlap */}
      <rect x="6" y="156" width="130" height="22" rx="11"
        fill="rgba(255,80,60,.1)" stroke="#FF5A45" strokeWidth="1.5"/>
      <text x="71" y="171" fontSize="9" textAnchor="middle"
        fill="#c03010" fontWeight="700">⚠️ 需 pH 3.0–3.5</text>
      <rect x="145" y="156" width="135" height="22" rx="11"
        fill="rgba(255,200,50,.12)" stroke="#FFB020" strokeWidth="1.2"/>
      <text x="212" y="171" fontSize="9" textAnchor="middle"
        fill="#8a5000" fontWeight="600">🍬 糖度 &gt; 55%</text>
      <rect x="290" y="156" width="145" height="22" rx="11"
        fill="rgba(200,230,200,.2)" stroke="#60a060" strokeWidth="1.2"/>
      <text x="362" y="171" fontSize="9" textAnchor="middle"
        fill="#2a6020" fontWeight="600">✓ 耐熱 &gt; 80°C</text>
      {/* Title */}
      <text x="8" y="204" fontSize="9" fill="#c04020" fontWeight="700">
        HM Pectin — DE &gt; 50% | 疏水 + 氫鍵聚集
      </text>
    </svg>
  );
}

function IotaLBGDiagram() {
  return (
    <svg viewBox="0 0 440 200" style={{width:'100%',maxWidth:440,height:'auto'}}>
      <rect width="440" height="200" rx="14" fill="rgba(252,248,255,.85)"/>
      {/* Iota helix – wider amplitude than kappa */}
      <path d="M 20 80 Q 70 42, 120 80 Q 170 118, 220 80 Q 270 42, 320 80 Q 370 118, 420 80"
        stroke={C.iota} strokeWidth="7" fill="none" strokeLinecap="round"/>
      <path d="M 20 80 Q 70 42, 120 80 Q 170 118, 220 80 Q 270 42, 320 80 Q 370 118, 420 80"
        stroke="rgba(255,255,255,.45)" strokeWidth="3" fill="none"
        strokeLinecap="round" strokeDasharray="4 10"/>
      {/* 2 sulfate groups per repeat (more than kappa) */}
      {[65,90,165,190,265,290,365,390].map((x,i) => (
        <circle key={i} cx={x} cy={i%2===0?46:114} r="5"
          fill={C.iota} opacity=".85"/>
      ))}
      <text x="22" y="70" fontSize="9" fill="#7040b0" fontWeight="700">ι (2× SO₃⁻)</text>

      {/* LBG backbone — hairy zones (with branches) as straight line,
           smooth zones (no branches) as short ordered zigzag helices */}
      {/* Segment 1: smooth zone x=20–52 (short helix) */}
      <path d="M 20 148 Q 28 140, 36 148 Q 44 156, 52 148"
        stroke={C.lbg} strokeWidth="5" fill="none" strokeLinecap="round"/>
      {/* Segment 2: hairy zone x=52–130 (straight) */}
      <line x1={52} y1={148} x2={130} y2={148}
        stroke={C.lbg} strokeWidth="5" strokeLinecap="round"/>
      {/* Segment 3: smooth zone x=130–175 (helix) */}
      <path d="M 130 148 Q 140 138, 150 148 Q 160 158, 170 148 Q 174 143, 175 148"
        stroke={C.lbg} strokeWidth="5" fill="none" strokeLinecap="round"/>
      {/* Segment 4: hairy zone x=175–250 (straight) */}
      <line x1={175} y1={148} x2={250} y2={148}
        stroke={C.lbg} strokeWidth="5" strokeLinecap="round"/>
      {/* Segment 5: smooth zone x=250–305 (helix — labelled bald region) */}
      <path d="M 250 148 Q 260 137, 270 148 Q 280 159, 290 148 Q 300 137, 305 148"
        stroke={C.lbg} strokeWidth="6" fill="none" strokeLinecap="round"
        stroke-opacity="1"/>
      {/* Segment 6: hairy zone x=305–375 (straight) */}
      <line x1={305} y1={148} x2={375} y2={148}
        stroke={C.lbg} strokeWidth="5" strokeLinecap="round"/>
      {/* Segment 7: smooth zone x=375–420 (helix) */}
      <path d="M 375 148 Q 385 138, 395 148 Q 405 158, 415 148 Q 418 144, 420 148"
        stroke={C.lbg} strokeWidth="5" fill="none" strokeLinecap="round"/>

      {/* LBG galactose side chains — clustered at hairy zones */}
      {[62,85,108,190,215,240,318,342,365].map((x,i) => (
        <g key={i}>
          <line x1={x} y1={148} x2={x} y2={128}
            stroke={C.lbg} strokeWidth="3"/>
          <circle cx={x} cy={122} r="7"
            fill={C.lbg} stroke="white" strokeWidth="1.5"/>
        </g>
      ))}

      {/* Smooth zone highlight + label (centre smooth zone) */}
      <rect x="245" y="130" width="65" height="32" rx="6"
        fill="rgba(125,189,106,.15)" stroke={C.lbg}
        strokeWidth="1.5" strokeDasharray="4,2"/>
      <text x="278" y="175" fontSize="8" textAnchor="middle"
        fill="#3a7020" fontWeight="600">平滑區 / 交聯結合區</text>
      {/* Short helix label */}
      <text x="36" y="168" fontSize="7" textAnchor="middle"
        fill="#3a7020" fontWeight="600">有序螺旋</text>
      <text x="22" y="190" fontSize="9" fill="#3a8020" fontWeight="700">
        LBG — 平滑區（裸露甘露糖段）+ 分支毛茸半乳糖區
      </text>

      {/* Ca2+ bridges between chains */}
      {[[145,114],[315,114]].map(([x,y],i) => (
        <g key={i}>
          <line x1={x} y1={80} x2={x} y2={y+24}
            stroke={C.ca} strokeWidth="2" strokeDasharray="3,3"/>
          <circle cx={x} cy={y+8} r="11"
            fill={C.ca} stroke="white" strokeWidth="2"/>
          <text x={x} y={y+12} fontSize="8" textAnchor="middle"
            fontWeight="800" fill="#5a3800">Ca²⁺</text>
        </g>
      ))}
    </svg>
  );
}

function CMCDiagram() {
  const chains = [
    [30,55,75,15],[105,95,65,-30],[185,38,80,25],
    [265,125,58,-15],[345,65,72,40],[62,145,68,10],
    [200,168,60,-20],[318,38,70,30],[400,130,60,20],
  ];
  const arabicBlobs = [[148,92],[280,108],[210,52],[355,150]];
  return (
    <svg viewBox="0 0 440 195" style={{width:'100%',maxWidth:440,height:'auto'}}>
      <rect width="440" height="195" rx="14" fill="rgba(248,250,252,.85)"/>
      {/* Short CMC chains */}
      {chains.map(([x,y,len,rot],i) => (
        <g key={i} transform={`rotate(${rot}, ${x+len/2}, ${y})`}>
          <path d={`M ${x} ${y} C ${x+len*.3} ${y-14}, ${x+len*.7} ${y+14}, ${x+len} ${y}`}
            stroke={C.cmc} strokeWidth="5" fill="none" strokeLinecap="round"/>
          {[.28,.68].map((t,j) => (
            <circle key={j} cx={x+t*len} cy={y+(j===0?-10:10)} r="5"
              fill={C.cmc} opacity=".75"/>
          ))}
        </g>
      ))}
      {/* Arabic Gum globular particles */}
      {arabicBlobs.map(([x,y],i) => (
        <g key={i}>
          <circle cx={x} cy={y} r="24" fill={C.arabic}
            stroke="rgba(0,0,0,.08)" strokeWidth="1"/>
          {[0,45,90,135,180,225,270,315].map(ang => {
            const r2=ang*Math.PI/180;
            return (
              <circle key={ang}
                cx={x+Math.cos(r2)*20} cy={y+Math.sin(r2)*20}
                r="5" fill={C.arabic} opacity=".8"/>
            );
          })}
          <text x={x} y={y+4} fontSize="8"
            textAnchor="middle" fill="#7a6850">Gum</text>
        </g>
      ))}
      {/* Legend */}
      <rect x="4" y="176" width="340" height="14" rx="7"
        fill="rgba(168,196,212,.2)"/>
      <text x="174" y="187" fontSize="9" textAnchor="middle"

// Extra standalone single-polymer reference points shown on spectrum
const STANDALONE_SPECTRUM = [
  { id:'kappa-alone',  title:'κ-鹿角菜膠（單獨）', macro:{ color:C.kappa,  spectrumPosition:83, label:'堅硬脆性' }, shape:'diamond' },
  { id:'lbg-alone',    title:'LBG（單獨）',         macro:{ color:C.lbg,    spectrumPosition:9,  label:'弱增稠' },   shape:'diamond' },
  { id:'arabic-alone', title:'阿拉伯膠（單獨）',    macro:{ color:'#D4C9A8', spectrumPosition:3,  label:'入口即化' }, shape:'diamond' },
];

function TextureSpectrum({ systems }) {
  // Merge circle + diamond markers, sort by position
  const allMarkers = [
    ...systems.map(s => ({...s, markerType:'circle'})),
    ...STANDALONE_SPECTRUM.map(s => ({...s, markerType:'diamond'})),
  ].sort((a,b) => a.macro.spectrumPosition - b.macro.spectrumPosition);

  // Greedy row assignment: put marker in first row where gap > 10% from last
  const rowOf = {};
  const rowLast = [];
  allMarkers.forEach(m => {
    let placed = false;
    for(let r = 0; r < rowLast.length; r++){
      if(m.macro.spectrumPosition - rowLast[r] >= 10){
        rowOf[m.id] = r;
        rowLast[r] = m.macro.spectrumPosition;
        placed = true; break;
      }
    }
    if(!placed){ rowOf[m.id] = rowLast.length; rowLast.push(m.macro.spectrumPosition); }
  });
  const numRows = rowLast.length;
  const ROW_H = 38; // height per stagger row
  const BAR_ROW = 0; // gradient bar sits at row 0
  const barTop = 16; // top of gradient bar within its row slot
  const totalMarkerH = numRows * ROW_H + 8;

  return (
    <div style={{
      background:'white', borderRadius:16,
      padding:'20px 28px',
      boxShadow:'0 4px 22px rgba(0,0,0,.07)',
      marginTop:4,
    }}>
      <div style={{fontSize:13,fontWeight:'700',color:'#4a5568',
        marginBottom:6,textAlign:'center'}}>
        口感質地光譜 Texture Spectrum
      </div>
      <div style={{fontSize:10,color:'#a0aec0',textAlign:'center',marginBottom:14}}>
        ◆ = 單一膠體參考點 &nbsp;● = 混合配方結果
      </div>

      {/* Main bar container */}
      <div style={{position:'relative', height: totalMarkerH + 28, marginBottom:8}}>
        {/* Gradient bar — always at top */}
        <div style={{
          position:'absolute', top: barTop, left:0, right:0, height:14,
          borderRadius:7,
          background:'linear-gradient(90deg,#A8C4D4,#C9A6E0,#FFD6E0,#F5E6C8,#7EC8E3,#7DBD6A,#B8E0FF)',
          boxShadow:'0 2px 10px rgba(0,0,0,.1)',
        }}/>

        {/* All markers, staggered by row */}
        {allMarkers.map((m, i) => {
          const row = rowOf[m.id];
          const isCircle = m.markerType === 'circle';
          // Row 0 = immediately above bar, row 1 = above row 0, etc.
          const markerTopFromBarTop = barTop - (row + 1) * ROW_H;
          return (
            <div key={m.id} style={{
              position:'absolute',
              left:`${m.macro.spectrumPosition}%`,
              top: Math.max(0, markerTopFromBarTop),
              transform:'translateX(-50%)',
            }}>
              {/* Connector line from marker to bar */}
              <div style={{
                width:1.5,
                height: Math.max(4, row * ROW_H + barTop - Math.max(0, markerTopFromBarTop) + (isCircle?22:18)),
                background:'rgba(0,0,0,.1)',

/* Haworth-style pyranose ring helper */
function PyranRing({x,y,fill,stroke,label,sub,size=1}){
  const s=size, w=40*s, h=26*s, rx=7*s;
  const lx=x-w/2, ty=y-h/2;
  return (
    <g>
      <rect x={lx} y={ty} width={w} height={h} rx={rx}
        fill={fill||'#fff'} stroke={stroke||'#444'} strokeWidth={1.5*s}/>
      {label && <text x={x} y={sub ? y-1*s : y+5*s} fontSize={9*s} textAnchor="middle"
        fill={stroke||'#333'} fontWeight="700">{label}</text>}
      {sub && <text x={x} y={y+10*s} fontSize={6.5*s} textAnchor="middle"
        fill={stroke||'#555'}>{sub}</text>}
    </g>
  );
}

/* ── Gelatin Structure ── */
function GelatinStructure(){
  return(
    <svg viewBox="0 0 300 150" style={{width:'100%',height:'auto'}}>
      <rect width="300" height="150" rx="10" fill="#F5F8FF"/>
      {/* Triple helix representation */}
      {[0,1,2].map(strand => {
        const yOff = strand*14 - 14;
        const col = ['#D8EEFF','#BFCCE8','#EEEFF5'][strand];
        const pts = [];
        for(let i=0;i<=20;i++){
          const x = 20 + i*13;
          const y = 75 + yOff + Math.sin(i*0.7 + strand*2.1)*10;
          pts.push(`${i===0?'M':'L'} ${x} ${y}`);
        }
        return <path key={strand} d={pts.join(' ')} stroke={col} strokeWidth={5}
          fill="none" strokeLinecap="round" opacity="0.85"/>;
      })}
      {/* Junction zone label */}
      <rect x={100} y={100} width={100} height={14} rx={6} fill="rgba(60,80,160,.1)" stroke="#3050A0"/>
      <text x={150} y={110} fontSize={7} textAnchor="middle" fill="#3050A0">三重螺旋 Junction Zone</text>
      {/* Key residues */}
      <text x={150} y={130} fontSize={7} textAnchor="middle" fill="#888">Gly-Pro-Hyp 三肽重複 | 左手多重螺旋 | 35°C 融化</text>
      {/* Strand labels */}
      <text x={18} y={56} fontSize={6.5} fill="#3050A0">α1</text>
      <text x={18} y={70} fontSize={6.5} fill="#3050A0">α1</text>
      <text x={18} y={84} fontSize={6.5} fill="#3050A0">α2</text>
    </svg>
  );
}

/* ── Molecule Shape Bar ── */
function MoleculeShapeBar({shape, mwLabel, color}){
  const C2 = color || '#888';
  const lightC = C2 + '55';
  return (
    <div style={{
      borderTop:'1px solid #f0f0f0',
      padding:'6px 10px 8px',
      background:'rgba(248,250,252,.7)',
    }}>
      <div style={{fontSize:8.5,color:'#aaa',marginBottom:3}}>
        <span style={{fontWeight:'700',color:'#888'}}>分子鏈形態</span>
        {'  ·  MW: '}
        <span style={{fontWeight:'700',color:'#555'}}>{mwLabel}</span>
      </div>
      <svg viewBox="0 0 280 40" style={{width:'100%',height:'auto',display:'block'}}>
        {shape==='linear-long' && <>
          <path d="M8 20 L272 20" stroke={C2} strokeWidth="3.5" strokeLinecap="round" opacity="0.7"/>
          {Array.from({length:22},(_,i)=>(
            <line key={i} x1={8+i*12.4} y1={15} x2={8+i*12.4} y2={25} stroke={C2} strokeWidth="1.5" opacity="0.55"/>
          ))}
          <text x={140} y={35} fontSize={7.5} textAnchor="middle" fill="#bbb">線性長鏈 Linear — 超高分子量</text>
        </>}
        {shape==='linear-medium' && <>
          <path d="M32 20 L248 20" stroke={C2} strokeWidth="3" strokeLinecap="round" opacity="0.7"/>
          {Array.from({length:13},(_,i)=>(
            <line key={i} x1={32+i*16.6} y1={15} x2={32+i*16.6} y2={25} stroke={C2} strokeWidth="1.5" opacity="0.55"/>
          ))}
          <text x={140} y={35} fontSize={7.5} textAnchor="middle" fill="#bbb">線性中鏈 Linear — 中等分子量</text>
        </>}
        {shape==='coiled-helix' && <>
          {/* Helix / coil wave */}
          <path d={`M10 20 ${Array.from({length:22},(_,i)=>`Q${10+i*12+6} ${i%2===0?9:31} ${10+(i+1)*12} 20`).join(' ')}`}
            stroke={C2} strokeWidth="3" fill="none" strokeLinecap="round" opacity="0.75"/>
          <text x={140} y={36} fontSize={7.5} textAnchor="middle" fill="#bbb">螺旋鏈 Helix / Coil — 凝膠化時規則雙螺旋</text>
        </>}
        {shape==='branched-galm' && <>
          {/* LBG: backbone + periodic Gal branches */}
          <path d="M8 22 L272 22" stroke={C2} strokeWidth="3.5" strokeLinecap="round" opacity="0.7"/>
          {/* Smooth zone: no branches */}
          <rect x={8} y={27} width={80} height={6} rx={3} fill="#3a7a2833" stroke="none"/>
          <text x={48} y={36} fontSize={6.5} textAnchor="middle" fill="#3a7a28">平滑區</text>
          {/* Hairy zone: branches */}
          {[108,128,148,168,188,208,228].map((bx,j) => (
            <line key={j} x1={bx} y1={22} x2={bx+(j%2===0?-5:5)} y2={10} stroke={C2} strokeWidth="2" opacity="0.65"/>
          ))}
          <rect x={100} y={27} width={140} height={6} rx={3} fill="#7DBD6A33" stroke="none"/>
          <text x={170} y={36} fontSize={6.5} textAnchor="middle" fill="#3a7a28">分支毛茸區</text>
        </>}
        {shape==='branched-stiff' && <>
          {/* Xanthan: stiff backbone, trisaccharide side chains */}
          <path d="M8 22 L272 22" stroke={C2} strokeWidth="4" strokeLinecap="round" opacity="0.7"/>
          {[40,80,120,160,200,240].map((bx)=>(
            <g key={bx}>
              <line x1={bx} y1={22} x2={bx} y2={9} stroke={C2} strokeWidth="2" opacity="0.6"/>
              <line x1={bx} y1={9} x2={bx-5} y2={4} stroke={C2} strokeWidth="1.5" opacity="0.5"/>
              <line x1={bx} y1={9} x2={bx+5} y2={4} stroke={C2} strokeWidth="1.5" opacity="0.5"/>
            </g>
          ))}
          <text x={140} y={37} fontSize={7.5} textAnchor="middle" fill="#bbb">剛性長鏈 + 三糖側鏈 — 假塑性流體</text>
        </>}
        {shape==='globular' && <>
          {/* Arabic gum: sphere */}
          <ellipse cx={75} cy={19} rx={32} ry={14} fill={lightC} stroke={C2} strokeWidth="1.5"/>
          <ellipse cx={75} cy={19} rx={19} ry={8} fill={C2} fillOpacity="0.25"/>
          {/* Protein core dot */}
          <circle cx={75} cy={19} r={4} fill={C2} opacity="0.5"/>
          <text x={75} y={36} fontSize={7.5} textAnchor="middle" fill="#bbb">高度支鏈球形 AGP</text>
          <text x={175} y={14} fontSize={7} fill="#bbb">溶解度 &gt; 50%</text>
          <text x={175} y={24} fontSize={7} fill="#bbb">蛋白質核心兩親性</text>
        </>}
        {shape==='triple-helix' && <>
          {[0,1,2].map(s => {
            const pts = Array.from({length:22},(_,i)=>{
              const x = 10+i*12;
              const y = 19 + Math.sin(i*0.65+s*2.1)*7;
              return `${i===0?'M':'L'} ${x} ${y}`;
            }).join(' ');
            return <path key={s} d={pts}
              stroke={['#D8EEFF','#8899CC','#EEEFF5'][s]} strokeWidth="4"
              fill="none" strokeLinecap="round" opacity="0.85"/>;
          })}
          <text x={140} y={36} fontSize={7.5} textAnchor="middle" fill="#bbb">三重螺旋 Triple Helix — 冷卻時形成，35°C 融化</text>
        </>}
      </svg>
    </div>
  );
}
